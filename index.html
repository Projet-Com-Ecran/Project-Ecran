<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Facebook TV Display - Digital Signage</title>
    <meta name="description" content="Affichage dynamique plein écran pour les publications Facebook" />
    <meta name="theme-color" content="#000000" />
    <style>
      /* Prévenir le scroll et les interactions natives du navigateur */
      html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
        color: #fff;
      }

      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* Désactiver le zoom du navigateur */
      body {
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
